<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <link
      rel="preload"
      as="image"
      href="../../assets/download.jpeg"
      fetchpriority="high"
    />
    <script src="../../src/js/page-transition.js"></script>

    <title>Login - SHRUHH SSC Chatbot</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brandPurple: "#1a0b2e",
              accentViolet: "#a78bfa",
            },
            backgroundImage: {
              "button-gradient": "linear-gradient(to bottom, #b794f4, #805ad5)",
            },
          },
        },
      };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        /* No background-color: .bg-abstract is a negative z-index child and
         body's own opaque bg would paint over it. html's bg is the fallback. */
        min-height: 100vh;
        overflow: hidden;
        font-family: "Plus Jakarta Sans", ui-sans-serif, system-ui, sans-serif;
        letter-spacing: -0.01em;
      }

      .bg-abstract {
        position: fixed;
        inset: 0;
        background-image:
          radial-gradient(
            900px 600px at 12% -5%,
            rgba(167, 139, 250, 0.22),
            transparent 60%
          ),
          radial-gradient(
            700px 600px at 100% 105%,
            rgba(124, 58, 237, 0.22),
            transparent 55%
          ),
          url("assets/download.jpeg");
        background-size: cover;
        background-position: center;
        filter: blur(5px);
        transform: scale(1.1);
        z-index: -1;
      }

      .glass-card {
        position: relative;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(25px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow:
          0 24px 70px -12px rgba(0, 0, 0, 0.85),
          0 0 0 1px rgba(167, 139, 250, 0.08);
      }

      input::placeholder {
        color: rgba(255, 255, 255, 0.5);
      }

      input[type="email"],
      input[type="password"] {
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease,
          background 0.2s ease;
      }

      input[type="email"]:focus,
      input[type="password"]:focus {
        outline: none;
        box-shadow: none;
        border-color: rgba(167, 139, 250, 0.6);
        background: rgba(0, 0, 0, 0.3);
      }

      button[type="submit"] {
        box-shadow: 0 10px 28px -6px rgba(124, 58, 237, 0.55);
        transition:
          filter 0.2s ease,
          transform 0.12s ease,
          box-shadow 0.2s ease;
      }

      button[type="submit"]:hover {
        filter: brightness(1.08);
        box-shadow: 0 14px 34px -6px rgba(124, 58, 237, 0.7);
      }

      button[type="submit"]:active {
        transform: scale(0.98);
      }
    </style>
  </head>

  <body class="flex items-center justify-center text-white">
    <div class="bg-abstract"></div>

    <main class="w-full max-w-md px-6 py-12">
      <section class="glass-card rounded-[40px] px-8 py-12">
        <div class="text-center mb-8">
          <svg
            fill="none"
            width="60"
            height="60"
            viewBox="0 0 100 100"
            class="mx-auto mb-3"
          >
            <rect
              x="35"
              y="10"
              width="15"
              height="45"
              rx="7.5"
              transform="rotate(35 35 10)"
              fill="#7c3aed"
            />
            <rect
              x="50"
              y="45"
              width="15"
              height="45"
              rx="7.5"
              transform="rotate(35 50 45)"
              fill="#4c1d95"
            />
          </svg>

          <h1 class="text-2xl font-semibold tracking-widest">
            SHRUHH SSC CHATBOT
          </h1>

          <h2 class="text-xl mt-4">Welcome Back</h2>
        </div>

        <!-- FORM LOGIN -->
        <form id="loginForm" class="space-y-6">
          <div>
            <label class="block mb-2"> Email Address </label>

            <input
              id="email"
              type="email"
              required
              class="w-full rounded-xl bg-black/20 border border-white/20 px-4 py-3"
            />
          </div>

          <div>
            <label class="block mb-2"> Password </label>

            <input
              id="password"
              type="password"
              required
              class="w-full rounded-xl bg-black/20 border border-white/20 px-4 py-3"
            />

            <a href="#" class="text-sm text-gray-300 mt-2 inline-block">
              Forgot Password?
            </a>
          </div>

          <button
            type="submit"
            class="w-full py-3 rounded-xl bg-purple-600 hover:bg-purple-700 transition"
          >
            Login
          </button>
        </form>

        <!-- ERROR MESSAGE -->
        <p id="errorMsg" class="text-red-400 text-center mt-4 hidden"></p>

        <div class="text-center mt-8">
          Are you a new member?
          <a href="/register" class="font-bold"> Sign Up </a>
        </div>
      </section>
    </main>

    <script src="../../src/js/login.js"></script>
  </body>
</html>
