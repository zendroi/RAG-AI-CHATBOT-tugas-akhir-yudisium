<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot TA dan Yudisium</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
  }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #2d1b4d 0%, #1a0b2e 100%);
    color: #f3eefc;
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
    flex-direction: column;
  }

  header {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.12);
  }

  .wrap {
    width: min(820px, calc(100% - 32px));
    margin: 0 auto;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    min-height: 70px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand .logo {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
  }

  .brand h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1px;
    color: #ffffff;
  }

  .brand p {
    font-size: 12px;
    color: #c9b8ec;
  }

  .logout-link {
    color: #c9b8ec;
    font-size: 13px;
    text-decoration: none;
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 8px;
    padding: 8px 14px;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap;
  }

  .logout-link:hover {
    background: rgba(255, 255, 255, 0.08);
    color: #ffffff;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px 0;
    min-height: 0;
  }

  .chat-panel {
    flex: 1;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.45);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .chat-messages::-webkit-scrollbar {
    width: 6px;
  }

  .chat-messages::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.15);
    border-radius: 10px;
  }

  .msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 14px;
    line-height: 1.5;
    font-size: 14px;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }

  .msg.bot {
    align-self: flex-start;
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-bottom-left-radius: 4px;
  }

  .msg.user {
    align-self: flex-end;
    background: linear-gradient(to bottom, #b794f4, #805ad5);
    color: #ffffff;
    border-bottom-right-radius: 4px;
  }

  .msg.bot.loading {
    color: #c9b8ec;
    font-style: italic;
  }

  .empty-state {
    text-align: center;
    color: #c9b8ec;
    font-size: 13px;
    margin: auto;
    padding: 40px 20px;
  }

  .empty-state .logo {
    width: 56px;
    height: 56px;
    margin: 0 auto 14px;
    display: block;
  }

  .empty-state h2 {
    color: #ffffff;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .chat-input-bar {
    border-top: 1px solid rgba(255, 255, 255, 0.12);
    padding: 14px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .chat-input-bar textarea {
    flex: 1;
    resize: none;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    background: rgba(0, 0, 0, 0.2);
    color: #f3eefc;
    font: inherit;
    font-size: 14px;
    padding: 12px 14px;
    max-height: 120px;
    line-height: 1.4;
  }

  .chat-input-bar textarea::placeholder {
    color: rgba(255, 255, 255, 0.45);
  }

  .chat-input-bar textarea:focus {
    outline: none;
    border-color: rgba(167, 139, 250, 0.6);
    box-shadow: 0 0 0 2px rgba(167, 139, 250, 0.25);
    background: rgba(0, 0, 0, 0.3);
  }

  .chat-input-bar button {
    border: 0;
    border-radius: 12px;
    background: linear-gradient(to bottom, #b794f4, #805ad5);
    color: #ffffff;
    cursor: pointer;
    font-weight: 700;
    font-size: 14px;
    min-height: 46px;
    padding: 0 22px;
    transition: filter 0.2s, transform 0.1s;
    flex-shrink: 0;
  }

  .chat-input-bar button:hover {
    filter: brightness(1.1);
  }

  .chat-input-bar button:active {
    transform: scale(0.98);
  }

  .chat-input-bar button:disabled {
    background: rgba(255, 255, 255, 0.15);
    cursor: wait;
  }

  @media (max-width: 600px) {
    .msg {
      max-width: 90%;
    }
  }
</style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <div class="brand">
        <svg class="logo" fill="none" height="60" viewbox="0 0 100 100" width="60" xmlns="http://www.w3.org/2000/svg">
          <rect fill="#7c3aed" fill-opacity="0.8" height="45" rx="7.5" transform="rotate(35 35 10)" width="15" x="35" y="10"></rect>
          <rect fill="#4c1d95" fill-opacity="0.8" height="45" rx="7.5" transform="rotate(35 50 45)" width="15" x="50" y="45"></rect>
        </svg>
        <div>
          <h1>SHRUHH CHATBOT</h1>
          <p>Asisten TA dan Yudisium</p>
        </div>
      </div>
      <a class="logout-link" href="#" id="logoutBtn">Logout</a>
    </div>
  </header>

  <main class="wrap">
    <div class="chat-panel">
      <div class="chat-messages" id="chatMessages">
        <div class="empty-state" id="emptyState">
          <svg class="logo" fill="none" height="60" viewbox="0 0 100 100" width="60" xmlns="http://www.w3.org/2000/svg">
            <rect fill="#7c3aed" fill-opacity="0.8" height="45" rx="7.5" transform="rotate(35 35 10)" width="15" x="35" y="10"></rect>
            <rect fill="#4c1d95" fill-opacity="0.8" height="45" rx="7.5" transform="rotate(35 50 45)" width="15" x="50" y="45"></rect>
          </svg>
          <h2>SHRUHH CHATBOT</h2>
          <p>Tanyakan apa saja seputar Tugas Akhir, sidang, pembimbing, yudisium, kelulusan, dan administrasi akademik.</p>
        </div>
      </div>
      <form class="chat-input-bar" id="chatForm">
        <textarea id="chatInput" placeholder="Tulis pertanyaan kamu..." rows="1" required></textarea>
        <button type="submit" id="sendBtn">Kirim</button>
      </form>
    </div>
  </main>

  <script src="home.js"></script>
</body>
</html>
