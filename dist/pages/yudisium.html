<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Chatbot TA dan Yudisium</title>
    <script type="module" crossorigin src="/assets/yudisium-Bz4fEc_W.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/layout-BFBprRwP.js">
    <link rel="stylesheet" crossorigin href="/assets/style-D6RUN4ku.css">
  </head>
  <body>
    <div class="flex">
      <div id="sidebar"></div>
      <div class="bg-slate-100 main-content w-full">
        <div id="navbar"></div>
        <main class="wrap">

            <section>
              <div class="panel">
                <h2>Status Sistem</h2>
                <div class="status-grid">
                  <div class="metric">
                    <strong id="documentCount">0</strong>
                    <span>Dokumen</span>
                  </div>
                </div>
              </div>

         

              <div class="panel">
                <h2>Upload Dokumen</h2>
                <form id="uploadForm">
                  <label for="documents">Dokumen PDF, DOCX, atau TXT</label>
                  <input
                    id="documents"
                    name="documents"
                    type="file"
                    accept=".pdf,.docx,.txt"
                    multiple
                  />
                  <div class="actions">
                    <button type="submit" id="uploadBtn">Upload</button>
                    <span class="meta" id="uploadMessage"></span>
                  </div>
                </form>
              </div>

              <div class="panel">
                <h2>Dokumen Aktif</h2>
                <div class="document-list" id="documentList"></div>
              </div>
            </section>


   
        </main>
      </div>
    </div>

  </body>
</html>
